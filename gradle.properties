# Gradle build settings
org.gradle.caching=true
org.gradle.parallel=true
org.gradle.configureondemand=true
org.gradle.jvmargs=-Xmx2g

# Internal Maven/Gradle mirror URL for isolated builds.
# Set either this property or the environment variable INTERNAL_REPO_URL.
# Example for local host builds:
# internalRepoUrl=http://localhost:8081/repository/maven-internal/
# Example for Jenkins/Docker builds on Windows:
# internalRepoUrl=http://host.docker.internal:8081/repository/maven-internal/

internalRepoUrl=http://localhost:8081/repository/maven-internal/
