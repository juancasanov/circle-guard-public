version: '3.8'

services:
  nexus:
    image: sonatype/nexus3:3.59.0
    container_name: circleguard-nexus
    ports:
      - "8081:8081"
    volumes:
      - nexus-data:/nexus-data
    restart: unless-stopped
    environment:
      INSTALL4J_ADD_VM_PARAMS: "-Xms1200M -Xmx1200M -XX:MaxDirectMemorySize=2G"

volumes:
  nexus-data:
