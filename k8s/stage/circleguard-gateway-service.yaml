apiVersion: apps/v1
kind: Deployment
metadata:
  name: circleguard-gateway-service
  namespace: circleguard-stage
  labels:
    app: circleguard-gateway-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: circleguard-gateway-service
  template:
    metadata:
      labels:
        app: circleguard-gateway-service
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: gateway
          image: ghcr.io/juancasanov/circleguard-gateway-service:stage-latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8087
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "kubernetes"
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: circleguard-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: circleguard-config
                  key: REDIS_PORT
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: circleguard-secrets
                  key: JWT_SECRET
            - name: QR_SECRET
              valueFrom:
                secretKeyRef:
                  name: circleguard-secrets
                  key: QR_SECRET
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8087
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8087
            initialDelaySeconds: 60
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: circleguard-gateway-service
  namespace: circleguard-stage
  labels:
    app: circleguard-gateway-service
spec:
  type: ClusterIP
  selector:
    app: circleguard-gateway-service
  ports:
    - port: 8087
      targetPort: 8087
      protocol: TCP
      name: http
