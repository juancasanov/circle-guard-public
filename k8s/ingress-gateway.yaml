apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: circleguard-gateway-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: circleguard.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: circleguard-gateway-service
                port:
                  number: 8087
