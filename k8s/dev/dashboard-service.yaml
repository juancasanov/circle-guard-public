apiVersion: apps/v1
kind: Deployment
metadata:
  name: circleguard-dashboard-service
  namespace: circleguard-dev
  labels:
    app: circleguard-dashboard-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: circleguard-dashboard-service
  template:
    metadata:
      labels:
        app: circleguard-dashboard-service
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: dashboard
          image: ghcr.io/juancasanov/circleguard-dashboard-service:dev-latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8084
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "kubernetes"
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: circleguard-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: circleguard-config
                  key: DB_PORT
            - name: DB_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: circleguard-config
                  key: DB_USERNAME
            - name: DASHBOARD_DB_URL
              valueFrom:
                configMapKeyRef:
                  name: circleguard-config
                  key: DASHBOARD_DB_URL
            - name: DASHBOARD_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: circleguard-secrets
                  key: DASHBOARD_DB_PASSWORD
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8084
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8084
            initialDelaySeconds: 60
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: circleguard-dashboard-service
  namespace: circleguard-dev
  labels:
    app: circleguard-dashboard-service
spec:
  type: ClusterIP
  selector:
    app: circleguard-dashboard-service
  ports:
    - port: 8084
      targetPort: 8084
      protocol: TCP
      name: http
